services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  db:
    image: mariadb:10.11
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: tramites_municipales
      MYSQL_USER: tramites_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-devpass}
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    depends_on:
      - db

volumes:
  mariadb_dev_data:
